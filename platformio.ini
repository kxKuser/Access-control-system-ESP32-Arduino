; PlatformIO Project Configuration File
;
; ESP32 智能门锁主控板
; 芯片: ESP32-WROOM-32UE-N4
; 框架: Arduino (arduino-esp32) + FreeRTOS 多核

[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino

; arduino-esp32 框架 (使用 PlatformIO 内置版本)
; 如需指定版本, 可取消注释并配置 platform_packages
; platform_packages =
;     framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.2.0

; 串口监视器配置
monitor_speed = 115200
monitor_port = COM3

; 上传配置
upload_speed = 921600

; 构建配置
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -Iinclude

; 库依赖 (Blinker 需手动安装到 lib/ 目录)
; lib_deps =
;     blinker-iot/Blinker @ ^0.3.9

; 分区方案 (默认)
board_build.partitions = default.csv
